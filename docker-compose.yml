services:
  db:
    image: postgres:17-alpine
    container_name: adcs-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adcs2026
      POSTGRES_DB: adcs_db_2
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - /var/lib/adcs/postgres:/var/lib/postgresql/data/pgdata
      - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql
    networks:
      - adcs_web_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./adcs-backend
    container_name: backend
    restart: always
    env_file:
      - ./adcs-backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:adcs2026@db:5432/adcs_db_2
    expose:
      - "8000"
    volumes:
      - ./adcs-backend:/app 
      - /mnt/data2tb/adcs/uploads:/mnt/data2tb/adcs/uploads
      - ./adcs-backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      adcs_web_network:
        aliases:
          - backend

  frontend:
    build:
      context: ./adcs-frontend
    container_name: frontend
    restart: always
    env_file:
      - ./adcs-frontend/.env
    ports:
      - "12011:80"
    depends_on:
      - backend
    networks:
      - adcs_web_network

networks:
  adcs_web_network:
    driver: bridge